<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投稿社死经历</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #FFFFFF; font-family: 'DM Sans', -apple-system, sans-serif; }
    .app { max-width: 402px; margin: 0 auto; min-height: 100svh; display: flex; flex-direction: column; }

    .header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
    .close-btn { width: 36px; height: 36px; border-radius: 18px; background: #F9FAFB; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .header-title { font-family: 'Bricolage Grotesque', sans-serif; font-size: 17px; font-weight: 700; color: #1A1A1A; }
    .draft-btn { font-size: 14px; color: #9CA3AF; background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; }

    .scroll-area { flex: 1; overflow-y: auto; padding: 4px 16px 200px; display: flex; flex-direction: column; gap: 16px; }

    /* Tip */
    .tip { background: #FEF3C7; border-radius: 12px; padding: 12px 16px; display: flex; align-items: flex-start; gap: 8px; }
    .tip-text { font-size: 13px; color: #D97706; line-height: 1.5; }

    /* Textarea */
    .textarea-wrap { background: #F6F7F8; border-radius: 16px; padding: 14px 16px; border: 1.5px solid transparent; transition: border-color 0.15s; }
    .textarea-wrap:focus-within { border-color: #E11D48; background: #FFF; }
    textarea { width: 100%; min-height: 180px; background: transparent; border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 15px; color: #1A1A1A; line-height: 1.7; resize: none; }
    textarea::placeholder { color: #9CA3AF; }
    .char-row { display: flex; justify-content: flex-end; margin-top: 8px; }
    .char-count { font-size: 12px; color: #9CA3AF; }

    /* Score preview */
    .score-preview { background: #FEF2F2; border-radius: 16px; padding: 16px; display: flex; align-items: center; gap: 14px; }
    .preview-left { font-size: 36px; }
    .preview-label { font-size: 12px; color: #9CA3AF; }
    .preview-value { font-family: 'Bricolage Grotesque', sans-serif; font-size: 22px; font-weight: 800; color: #E11D48; margin-top: 2px; line-height: 1.1; }
    .preview-reason { font-size: 12px; color: #9CA3AF; margin-top: 4px; }
    .preview-loader { width: 20px; height: 20px; border: 2px solid #FECACA; border-top-color: #E11D48; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Tag selector */
    .section-label { font-size: 13px; font-weight: 600; color: #6B7280; }
    .tag-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag-btn { padding: 7px 14px; border-radius: 99px; font-size: 13px; border: 1.5px solid #E5E7EB; background: #F9FAFB; color: #6B7280; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
    .tag-btn.selected { border-color: #E11D48; background: #FEF2F2; color: #E11D48; font-weight: 600; }

    /* Options */
    .option-row { background: #F6F7F8; border-radius: 16px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
    .option-left { display: flex; align-items: center; gap: 10px; }
    .option-icon { font-size: 20px; }
    .option-text { font-size: 15px; color: #1A1A1A; }
    .option-right { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #9CA3AF; }
    .toggle { width: 48px; height: 28px; border-radius: 14px; position: relative; border: none; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
    .toggle.on { background: #E11D48; }
    .toggle.off { background: #D1D5DB; }
    .knob { width: 22px; height: 22px; background: #FFF; border-radius: 11px; position: absolute; top: 3px; transition: left 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
    .toggle.on .knob { left: 23px; }
    .toggle.off .knob { left: 3px; }

    /* Bottom */
    .submit-area { position: fixed; bottom: 64px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 402px; background: #FFFFFF; border-top: 1px solid #F3F4F6; padding: 14px 16px 10px; display: flex; flex-direction: column; gap: 8px; z-index: 50; }
    .submit-btn { width: 100%; height: 54px; border-radius: 28px; border: none; background: #E11D48; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: 17px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 16px rgba(225,29,72,0.3); transition: all 0.15s; }
    .submit-btn:disabled { background: #D1D5DB; box-shadow: none; cursor: not-allowed; }
    .submit-btn:not(:disabled):active { opacity: 0.85; }
    .disclaimer { text-align: center; font-size: 11px; color: #9CA3AF; }
    /* Bottom nav */
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 402px; background: #FFFFFF; border-top: 1px solid #F3F4F6; padding: 8px 0 env(safe-area-inset-bottom, 12px); display: flex; z-index: 50; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; text-decoration: none; padding: 4px 0; cursor: pointer; }
    .nav-icon { font-size: 22px; line-height: 1; }
    .nav-label { font-size: 10px; color: #9CA3AF; font-weight: 500; }
    .nav-item.active .nav-label { color: #E11D48; }
    .nav-fab { width: 46px; height: 46px; border-radius: 23px; background: #E11D48; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 4px 12px rgba(225,29,72,0.35); margin-top: -10px; }

    /* Location modal (centered) */
    .sheet-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; opacity: 0; transition: opacity 0.2s; pointer-events: none; display: flex; align-items: center; justify-content: center; }
    .sheet-mask.show { opacity: 1; pointer-events: auto; }
    .sheet { background: #FFFFFF; border-radius: 20px; padding: 20px; width: calc(100% - 48px); max-width: 354px; z-index: 101; transform: scale(0.92); opacity: 0; transition: transform 0.22s cubic-bezier(0.32,0.72,0,1), opacity 0.22s; pointer-events: none; }
    .sheet-mask.show .sheet { transform: scale(1); opacity: 1; pointer-events: auto; }
    .sheet-title { font-size: 15px; font-weight: 700; color: #1A1A1A; text-align: center; margin-bottom: 16px; }
    .city-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .city-btn { height: 44px; border-radius: 12px; border: 1.5px solid #E5E7EB; background: #F9FAFB; color: #374151; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.15s; }
    .city-btn.selected { border-color: #E11D48; background: #FEF2F2; color: #E11D48; font-weight: 600; }
    .city-btn:active { opacity: 0.7; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <button class="close-btn" onclick="history.back()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
    <span class="header-title" id="headerTitle">投稿社死经历</span>
    <button class="draft-btn" id="draftBtn" onclick="saveDraft()">草稿</button>
  </div>

  <div class="scroll-area">
    <div class="tip">
      <span style="font-size:16px;flex-shrink:0">💡</span>
      <span class="tip-text">越真实、越详细的故事越容易上热门哦~ 内容越丰富，社死指数越准确！</span>
    </div>

    <div>
      <div class="textarea-wrap">
        <textarea id="storyInput" maxlength="500" oninput="onInput()"
          placeholder="说说你的社死经历吧...&#10;&#10;比如：&#10;- 发生了什么&#10;- 当时的心情&#10;- 后续怎么样了"></textarea>
      </div>
      <div class="char-row">
        <span id="charHint" style="font-size:12px;color:#E11D48"></span>
        <span class="char-count"><span id="charNum">0</span> / 500</span>
      </div>
    </div>

    <!-- Score preview -->
    <div class="score-preview" id="scorePreview" style="display:none">
      <div class="preview-left">💀</div>
      <div style="flex:1">
        <div class="preview-label">AI 社死指数评估</div>
        <div id="previewContent">
          <div class="preview-loader"></div>
        </div>
      </div>
    </div>

    <!-- Tag -->
    <div style="display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="section-label">选个分类</div>
        <span id="tagHint" style="font-size:12px;color:#E11D48;display:none">请选择一个分类</span>
      </div>
      <div class="tag-grid" id="tagGrid"></div>
    </div>

    <!-- Options -->
    <div style="display:flex;flex-direction:column;gap:8px">
      <div class="option-row">
        <div class="option-left">
          <span class="option-icon">🎭</span>
          <span class="option-text">匿名发布</span>
        </div>
        <button class="toggle on" id="anonToggle" onclick="toggleAnon()">
          <div class="knob"></div>
        </button>
      </div>
      <div class="option-row" onclick="pickLocation()">
        <div class="option-left">
          <span class="option-icon">📍</span>
          <span class="option-text">添加地点</span>
        </div>
        <div class="option-right">
          <span id="locationVal">不添加</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
      </div>
    </div>
  </div>

  <div class="submit-area">
    <button class="submit-btn" id="submitBtn" disabled onclick="submitPost()">
      🚀 发布社死经历
    </button>
    <div class="disclaimer">发布即表示同意《社区规范》，请勿发布虚假或侵权内容</div>
  </div>

  <div class="bottom-nav">
    <a class="nav-item" href="index.html"><span class="nav-icon">🏠</span><span class="nav-label">首页</span></a>
    <a class="nav-item active" href="submit.html"><div class="nav-fab">✍️</div></a>
    <a class="nav-item" href="certificate.html"><span class="nav-icon">🏅</span><span class="nav-label">证书</span></a>
    <a class="nav-item" href="mine.html"><span class="nav-icon">👤</span><span class="nav-label">我的</span></a>
  </div>

  <!-- Location modal -->
  <div class="sheet-mask" id="sheetMask" onclick="closeSheet()">
    <div class="sheet" id="locationSheet" onclick="event.stopPropagation()">
      <div class="sheet-title">📍 选择地点</div>
      <div class="city-grid" id="cityGrid"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  const TAGS = ['职场','恋爱','校园','生活','网络','家庭','购物','医院','其他'];
  let selectedTag = '';
  let anonOn = true;
  let location_ = '';
  let scoreResult = null;
  let scoreTimer = null;
  const editId = new URLSearchParams(location.search).get('edit');

  // Render tags
  document.getElementById('tagGrid').innerHTML = TAGS.map(t => `
    <button class="tag-btn" onclick="selectTag('${t}', this)">${t}</button>
  `).join('');

  function selectTag(tag, el) {
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    selectedTag = tag;
    checkReady();
  }

  function toggleAnon() {
    anonOn = !anonOn;
    const btn = document.getElementById('anonToggle');
    btn.classList.toggle('on', anonOn);
    btn.classList.toggle('off', !anonOn);
  }

  const CITIES = ['不添加','北京','上海','广州','深圳','成都','杭州','武汉','西安','南京','重庆','其他'];

  function pickLocation() {
    // Render city grid
    document.getElementById('cityGrid').innerHTML = CITIES.map(c => `
      <button class="city-btn ${(location_ || '不添加') === c ? 'selected' : ''}" onclick="selectCity('${c}')">${c}</button>
    `).join('');
    document.getElementById('sheetMask').classList.add('show');
    document.getElementById('locationSheet').classList.add('show');
  }

  function selectCity(city) {
    location_ = city === '不添加' ? '' : city;
    document.getElementById('locationVal').textContent = city;
    closeSheet();
  }

  function closeSheet() {
    document.getElementById('sheetMask').classList.remove('show');
    document.getElementById('locationSheet').classList.remove('show');
  }

  function checkReady() {
    const text = document.getElementById('storyInput').value.trim();
    const btn = document.getElementById('submitBtn');
    const charHint = document.getElementById('charHint');
    const tagHint = document.getElementById('tagHint');
    const ready = text.length >= 5 && selectedTag;
    btn.disabled = !ready;
    // 字数提示
    if (text.length === 0) {
      charHint.textContent = '';
    } else if (text.length < 5) {
      charHint.textContent = `还差 ${5 - text.length} 字才能发布`;
    } else {
      charHint.textContent = '';
    }
    // 分类提示（只在字数够了但没选分类时显示）
    tagHint.style.display = (text.length >= 5 && !selectedTag) ? 'inline' : 'none';
  }

  function onInput() {
    const text = document.getElementById('storyInput').value;
    document.getElementById('charNum').textContent = text.length;
    checkReady();

    const preview = document.getElementById('scorePreview');
    if (text.trim().length > 15) {
      preview.style.display = 'flex';
      document.getElementById('previewContent').innerHTML = '<div class="preview-loader"></div>';
      clearTimeout(scoreTimer);
      scoreTimer = setTimeout(() => runScoring(text), 1200);
    } else {
      preview.style.display = 'none';
      scoreResult = null;
    }
  }

  async function runScoring(text) {
    scoreResult = null;
    const result = await calcDeathIndex(text);
    scoreResult = result;
    document.getElementById('previewContent').innerHTML = `
      <div class="preview-value">${result.score}/100 · ${result.level}</div>
      <div class="preview-reason">${result.reason}</div>
    `;
  }

  function saveDraft() {
    const text = document.getElementById('storyInput').value;
    if (text.trim()) {
      localStorage.setItem('shesi_draft', text);
      showToast('草稿已保存');
    }
  }

  async function submitPost() {
    const content = document.getElementById('storyInput').value.trim();
    if (!content || !selectedTag) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '⏳ AI 评估中…';

    try {
      if (!scoreResult) {
        scoreResult = await calcDeathIndex(content);
      }

      const post = {
        content,
        tag: selectedTag,
        deathIndex: scoreResult.score,
        deathLevel: scoreResult.level,
        deathReason: scoreResult.reason,
        anonymous: anonOn,
        location: location_,
        authorId: getAuthorId(),
      };

      if (editId) {
        await DB.updatePost(editId, post);
        showToast('修改已保存！');
        setTimeout(() => { location.href = 'detail.html?id=' + editId; }, 800);
      } else {
        const saved = await DB.savePost(post);
        localStorage.removeItem('shesi_draft');
        showToast('发布成功！正在跳转…');
        setTimeout(() => { location.href = 'detail.html?id=' + saved.id; }, 800);
      }
    } catch (err) {
      console.error('submitPost error:', err);
      showToast(editId ? '保存失败，请重试' : '发布失败，请重试', 'error');
      btn.disabled = false;
      btn.innerHTML = editId ? '💾 保存修改' : '🚀 发布社死经历';
    }
  }

  // Restore draft (only if not in edit mode)
  if (!editId) {
    const draft = localStorage.getItem('shesi_draft');
    if (draft) {
      document.getElementById('storyInput').value = draft;
      document.getElementById('charNum').textContent = draft.length;
      checkReady();
    }
  }

  // Edit mode init
  if (editId) {
    document.getElementById('headerTitle').textContent = '编辑社死经历';
    document.getElementById('draftBtn').style.display = 'none';
    document.getElementById('submitBtn').innerHTML = '💾 保存修改';
    DB.getPost(editId).then(post => {
      if (!post) { showToast('找不到该帖子', 'error'); return; }
      const ta = document.getElementById('storyInput');
      ta.value = post.content;
      document.getElementById('charNum').textContent = post.content.length;
      // Select tag
      selectedTag = post.tag;
      document.querySelectorAll('.tag-btn').forEach(b => {
        if (b.textContent.trim() === post.tag) b.classList.add('selected');
      });
      // Anon toggle
      anonOn = post.anonymous;
      const toggle = document.getElementById('anonToggle');
      toggle.classList.toggle('on', anonOn);
      toggle.classList.toggle('off', !anonOn);
      // Location
      location_ = post.location || '';
      document.getElementById('locationVal').textContent = location_ || '不添加';
      // Pre-fill score
      scoreResult = { score: post.deathIndex, level: post.deathLevel, reason: post.deathReason };
      checkReady();
      // Show score preview
      const preview = document.getElementById('scorePreview');
      preview.style.display = 'flex';
      document.getElementById('previewContent').innerHTML = `
        <div class="preview-value">${post.deathIndex}/100 · ${post.deathLevel}</div>
        <div class="preview-reason">${post.deathReason || ''}</div>
      `;
    });
  }
</script>
</body>
</html>
